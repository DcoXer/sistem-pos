<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e40af"/>
  
  <!-- Receipt/POS icon -->
  <rect x="140" y="100" width="232" height="280" rx="16" fill="white" opacity="0.15"/>
  <rect x="156" y="116" width="200" height="248" rx="12" fill="white" opacity="0.95"/>
  
  <!-- Lines on receipt -->
  <rect x="180" y="152" width="120" height="12" rx="6" fill="#1e40af" opacity="0.7"/>
  <rect x="180" y="180" width="80" height="8" rx="4" fill="#1e40af" opacity="0.4"/>
  <rect x="180" y="200" width="100" height="8" rx="4" fill="#1e40af" opacity="0.4"/>
  <rect x="180" y="220" width="70" height="8" rx="4" fill="#1e40af" opacity="0.4"/>
  
  <!-- Divider -->
  <rect x="172" y="244" width="168" height="2" rx="1" fill="#1e40af" opacity="0.2"/>
  
  <!-- Total amount -->
  <rect x="180" y="264" width="60" height="10" rx="5" fill="#1e40af" opacity="0.4"/>
  <rect x="272" y="264" width="76" height="10" rx="5" fill="#1e40af" opacity="0.8"/>
  
  <!-- Checkmark circle -->
  <circle cx="256" cy="322" r="18" fill="#1e40af" opacity="0.15"/>
  <path d="M246 322 l7 7 l14 -14" stroke="#1e40af" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>

  <!-- Zigzag bottom of receipt -->
  <path d="M156 348 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8 l10 -8 l10 8" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
